name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci || npm install
      
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true
      
      - name: Run TypeScript type check
        working-directory: ./frontend
        run: npx tsc --noEmit
        continue-on-error: true

  build-frontend:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install
      
      - name: Build Next.js app
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_MEDUSA_API_URL: http://localhost:9000
          NEXT_PUBLIC_PAYLOAD_API_URL: http://localhost:3001
        continue-on-error: true

  build-backend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/medusa/package-lock.json
      
      - name: Install Medusa dependencies
        working-directory: ./backend/medusa
        run: npm ci || npm install
      
      - name: Build Medusa
        working-directory: ./backend/medusa
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: test-secret
          COOKIE_SECRET: test-secret
        continue-on-error: true

  build-cms:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cms/payload/package-lock.json
      
      - name: Install Payload dependencies
        working-directory: ./cms/payload
        run: npm ci || npm install
      
      - name: Build Payload
        working-directory: ./cms/payload
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          PAYLOAD_SECRET: test-secret
        continue-on-error: true

  build-sync-service:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: sync-service/package-lock.json
      
      - name: Install sync service dependencies
        working-directory: ./sync-service
        run: npm ci || npm install
      
      - name: Build sync service
        working-directory: ./sync-service
        run: npm run build
        continue-on-error: true
